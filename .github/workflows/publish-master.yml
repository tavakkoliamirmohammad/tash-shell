name: Publish master binaries

# On every push to master, rebuild Release binaries and publish them
# to a rolling GitHub pre-release tagged `master-latest`. Users can
# always grab the most recent master build from the Releases page —
# no login, no Actions-UI dive.
#
# Complements .github/workflows/release.yml (which handles tagged
# versioned releases on `v*` tags). That workflow keeps producing
# real releases; this one just refreshes the master-latest tag.

on:
  push:
    branches: [master]
  workflow_dispatch:

# Rapid consecutive pushes to master (e.g., a merge train) only need the
# last one to publish. Cancel any earlier in-flight run so the rolling
# `master-latest` tag ends up pointing at the most recent commit.
concurrency:
  group: publish-master
  cancel-in-progress: true

permissions:
  contents: write   # required for softprops/action-gh-release

jobs:
  build:
    name: ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux amd64 — glibc dynamic, full-featured (AI + SQLite).
          # Built inside quay.io/pypa/manylinux_2_28_x86_64 (AlmaLinux 8)
          # so the resulting binary has a glibc 2.28 baseline. That
          # covers every mainstream distro from the last ~5 years:
          # Ubuntu 20.04+, Debian 11+, Fedora 30+, RHEL/Rocky/Alma 8+,
          # Amazon Linux 2023, Arch. Users still need libssl, libcurl,
          # libsqlite3 at runtime — one `apt/dnf install` on any distro.
          - os: ubuntu-22.04
            container: quay.io/pypa/manylinux_2_28_x86_64
            artifact: tash-linux-amd64
            kind: linux-manylinux
          # Linux arm64 — same story, aarch64 image on an arm runner.
          # Covers Raspberry Pi 64-bit, AWS Graviton, ARM servers.
          - os: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            artifact: tash-linux-arm64
            kind: linux-manylinux
          # macOS arm64 — Apple Silicon (M1/M2/M3/M4).
          - os: macos-14
            artifact: tash-macos-arm64
            kind: macos
          # macOS amd64 — Intel Macs.
          - os: macos-13
            artifact: tash-macos-amd64
            kind: macos
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (manylinux — dnf on AlmaLinux 8)
        # manylinux_2_28 is AlmaLinux 8. cmake + openssl + curl + sqlite
        # dev headers are all in the default repos; the image ships gcc
        # and git pre-installed.
        if: matrix.kind == 'linux-manylinux'
        run: |
          dnf install -y cmake gcc-c++ make \
            openssl-devel libcurl-devel sqlite-devel

      - name: Build Release
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF
          cmake --build build -j "$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 2)"

      - name: Smoke test built binary
        run: echo -e "echo publish_master_ok\nexit" | ./build/tash.out
      - name: Stage binary with final name
        env:
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          mkdir -p artifacts
          cp build/tash.out "artifacts/$ARTIFACT"
          chmod +x "artifacts/$ARTIFACT"

      # Two delivery paths so users can pick whichever fits their flow.

      # 1. Actions artifact — downloadable from the workflow run page,
      #    scoped to the commit SHA. Retained 90 days.
      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}
          retention-days: 90

      # 2. Rolling pre-release — the stable "latest master" download
      #    URL on the Releases page. softprops handles create-or-update.
      - name: Publish to master-latest pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: master-latest
          name: Latest master build
          body: |
            Rolling build of the latest commit on `master`.

            This is a snapshot, not a tagged release. For stable
            versioned builds, see the tags page.

            Commit: ${{ github.sha }}
          prerelease: true
          files: artifacts/${{ matrix.artifact }}
          fail_on_unmatched_files: true
