name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel in-progress runs when a newer commit lands on the same ref.
# Keeps us from wasting runner time on commits a user has already
# superseded — and prevents a slow macOS lane from blocking a merge
# by being "still running from 20 minutes ago".
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsqlite3-dev nlohmann-json3-dev
      - name: Pre-fetch FetchContent tarballs
        # GitHub's codeload CDN returns intermittent 504s; CMake's
        # file(DOWNLOAD) doesn't retry, so a single blip burns the whole
        # job (see B6.3 incident — 4+ PR runs lost in a day). curl
        # retries cleanly; we extract to a known dir and point CMake at
        # it via FETCHCONTENT_SOURCE_DIR_<NAME>, which makes FetchContent
        # skip the download entirely. (FETCHCONTENT_SOURCE_DIR_* is a
        # CMake cache variable, not an env var — so we export the -D
        # flags as $TASH_FC_ARGS and splice that into every cmake -B.)
        run: |
          set -e
          DEPS_DIR="${RUNNER_TEMP:-/tmp}/tash-deps"
          mkdir -p "${DEPS_DIR}"
          fetch() {
            local name="$1" url="$2"
            local tgz="${DEPS_DIR}/${name}.tar"
            echo "Pre-fetching ${name} from ${url}"
            curl --retry 5 --retry-delay 10 --retry-all-errors \
                 --fail --silent --show-error --max-time 120 \
                 -L -o "${tgz}" "${url}"
            mkdir -p "${DEPS_DIR}/${name}"
            tar -xf "${tgz}" --strip-components=1 -C "${DEPS_DIR}/${name}"
            rm -f "${tgz}"
          }
          fetch replxx https://github.com/AmokHuginnsson/replxx/archive/refs/tags/release-0.0.4.tar.gz
          fetch googletest https://github.com/google/googletest/archive/refs/tags/v1.14.0.tar.gz
          fetch nlohmann_json https://github.com/nlohmann/json/releases/download/v3.11.3/json.tar.xz
          FC_ARGS="-DFETCHCONTENT_SOURCE_DIR_REPLXX=${DEPS_DIR}/replxx"
          FC_ARGS="${FC_ARGS} -DFETCHCONTENT_SOURCE_DIR_GOOGLETEST=${DEPS_DIR}/googletest"
          FC_ARGS="${FC_ARGS} -DFETCHCONTENT_SOURCE_DIR_NLOHMANN_JSON=${DEPS_DIR}/nlohmann_json"
          echo "TASH_FC_ARGS=${FC_ARGS}" >> "$GITHUB_ENV"
      - name: Build and test
        run: |
          JOBS=$(getconf _NPROCESSORS_ONLN)
          cmake -B build -DBUILD_TESTS=ON ${TASH_FC_ARGS:-}
          cmake --build build -j "$JOBS"
          ctest --test-dir build --output-on-failure -j "$JOBS"
      - name: Smoke test
        run: echo -e "pwd\nls\necho hello\nexit" | ./build/tash.out
      - name: Assert full feature set
        # Every lane with OpenSSL + libcurl + SQLite installed should
        # produce a binary that reports +ai and +sqlite-history. Catches
        # the class of bug where a well-meaning refactor silently drops
        # a feature because CMake couldn't find a header.
        run: |
          FEATURES=$(./build/tash.out --version)
          echo "$FEATURES"
          echo "$FEATURES" | grep -q '+ai' \
            || { echo "FAIL: AI not compiled in on full-deps lane"; exit 1; }
          echo "$FEATURES" | grep -q '+sqlite-history' \
            || { echo "FAIL: SQLite history not compiled in on full-deps lane"; exit 1; }
      - name: Test install script (from-source path)
        run: |
          INSTALL_DIR=${{ runner.temp }}/tash-install
          mkdir -p "$INSTALL_DIR"
          cmake -B install-build -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release ${TASH_FC_ARGS:-}
          cmake --build install-build -j "$(getconf _NPROCESSORS_ONLN)"
          install -m 755 install-build/tash.out "$INSTALL_DIR/tash"
          echo -e "echo install_test\nexit" | "$INSTALL_DIR/tash"
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tash-${{ matrix.os }}
          path: build/tash.out

