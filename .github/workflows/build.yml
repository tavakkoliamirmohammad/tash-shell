name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev
      - name: Build and test
        run: |
          cmake -B build -DBUILD_TESTS=ON
          cmake --build build
          ctest --test-dir build --output-on-failure
      - name: Smoke test
        run: echo -e "pwd\nls\necho hello\nexit" | ./build/shell.out
      - name: Test install script (from-source path)
        run: |
          INSTALL_DIR=${{ runner.temp }}/tash-install
          mkdir -p "$INSTALL_DIR"
          cmake -B install-build -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build install-build
          install -m 755 install-build/shell.out "$INSTALL_DIR/tash"
          echo -e "echo install_test\nexit" | "$INSTALL_DIR/tash"
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tash-${{ matrix.os }}
          path: build/shell.out

  build-fedora:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: dnf install -y gcc-c++ readline-devel cmake make
      - name: Build and test
        run: |
          cmake -B build -DBUILD_TESTS=ON
          cmake --build build
          ctest --test-dir build --output-on-failure
      - name: Smoke test
        run: echo -e "pwd\nls\necho hello\nexit" | ./build/shell.out
      - name: Test install workflow
        run: |
          cmake -B install-build -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build install-build
          install -m 755 install-build/shell.out /usr/local/bin/tash
          echo -e "echo install_test\nexit" | /usr/local/bin/tash

  build-alpine:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: apk add --no-cache g++ readline-dev cmake make linux-headers
      - name: Build and test
        run: |
          cmake -B build -DBUILD_TESTS=ON
          cmake --build build
          ctest --test-dir build --output-on-failure
      - name: Smoke test
        run: echo -e "pwd\nls\necho hello\nexit" | ./build/shell.out
      - name: Test install workflow
        run: |
          cmake -B install-build -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build install-build
          install -m 755 install-build/shell.out /usr/local/bin/tash
          echo -e "echo install_test\nexit" | /usr/local/bin/tash

  sanitizer:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev
      - name: Build with AddressSanitizer
        run: |
          cmake -B build -DBUILD_TESTS=ON \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"
          cmake --build build
      - name: Run unit tests with sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: ./build/test_tokenizer
      - name: Run integration tests with sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: ctest --test-dir build --output-on-failure
      - name: Smoke test with sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: echo -e "pwd\nls\necho hello\nexit" | ./build/shell.out
