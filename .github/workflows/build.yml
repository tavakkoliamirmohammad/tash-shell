          mkdir -p "${DEPS_DIR}"
          fetch() {
            local name="$1" url="$2"
            local tgz="${DEPS_DIR}/${name}.tar"
            echo "Pre-fetching ${name} from ${url}"
            curl --retry 5 --retry-delay 10 --retry-all-errors \
                 --fail --silent --show-error --max-time 120 \
                 -L -o "${tgz}" "${url}"
            mkdir -p "${DEPS_DIR}/${name}"
            tar -xf "${tgz}" --strip-components=1 -C "${DEPS_DIR}/${name}"
            rm -f "${tgz}"
          }
          fetch replxx https://github.com/AmokHuginnsson/replxx/archive/refs/tags/release-0.0.4.tar.gz
          fetch googletest https://github.com/google/googletest/archive/refs/tags/v1.14.0.tar.gz
          fetch nlohmann_json https://github.com/nlohmann/json/releases/download/v3.11.3/json.tar.xz
          FC_ARGS="-DFETCHCONTENT_SOURCE_DIR_REPLXX=${DEPS_DIR}/replxx"
          FC_ARGS="${FC_ARGS} -DFETCHCONTENT_SOURCE_DIR_GOOGLETEST=${DEPS_DIR}/googletest"
          FC_ARGS="${FC_ARGS} -DFETCHCONTENT_SOURCE_DIR_NLOHMANN_JSON=${DEPS_DIR}/nlohmann_json"
          echo "TASH_FC_ARGS=${FC_ARGS}" >> "$GITHUB_ENV"
      - name: Build with AddressSanitizer + UndefinedBehaviorSanitizer
        run: |
          JOBS=$(getconf _NPROCESSORS_ONLN)
          cmake -B build -DBUILD_TESTS=ON -DTASH_SANITIZERS=ON ${TASH_FC_ARGS:-} \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build -j "$JOBS"
      - name: Run unit tests with sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=0
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ./build/test_tokenizer
      - name: Run integration tests with sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=0
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build --output-on-failure -j "$(getconf _NPROCESSORS_ONLN)"
      - name: Smoke test with sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=0
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: echo -e "pwd\nls\necho hello\nexit" | ./build/tash.out

  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsqlite3-dev nlohmann-json3-dev lcov
      - name: Pre-fetch FetchContent tarballs
        # GitHub's codeload CDN returns intermittent 504s; CMake's
        # file(DOWNLOAD) doesn't retry, so a single blip burns the whole
        # job (see B6.3 incident — 4+ PR runs lost in a day). curl
        # retries cleanly; we extract to a known dir and point CMake at
        # it via FETCHCONTENT_SOURCE_DIR_<NAME>, which makes FetchContent
        # skip the download entirely. (FETCHCONTENT_SOURCE_DIR_* is a
        # CMake cache variable, not an env var — so we export the -D
        # flags as $TASH_FC_ARGS and splice that into every cmake -B.)
        run: |
          set -e
          DEPS_DIR="${RUNNER_TEMP:-/tmp}/tash-deps"
          mkdir -p "${DEPS_DIR}"
          fetch() {
            local name="$1" url="$2"
            local tgz="${DEPS_DIR}/${name}.tar"
            echo "Pre-fetching ${name} from ${url}"
            curl --retry 5 --retry-delay 10 --retry-all-errors \
                 --fail --silent --show-error --max-time 120 \
                 -L -o "${tgz}" "${url}"
            mkdir -p "${DEPS_DIR}/${name}"
            tar -xf "${tgz}" --strip-components=1 -C "${DEPS_DIR}/${name}"
            rm -f "${tgz}"
          }
          fetch replxx https://github.com/AmokHuginnsson/replxx/archive/refs/tags/release-0.0.4.tar.gz
          fetch googletest https://github.com/google/googletest/archive/refs/tags/v1.14.0.tar.gz
          fetch nlohmann_json https://github.com/nlohmann/json/releases/download/v3.11.3/json.tar.xz
          FC_ARGS="-DFETCHCONTENT_SOURCE_DIR_REPLXX=${DEPS_DIR}/replxx"
          FC_ARGS="${FC_ARGS} -DFETCHCONTENT_SOURCE_DIR_GOOGLETEST=${DEPS_DIR}/googletest"
          FC_ARGS="${FC_ARGS} -DFETCHCONTENT_SOURCE_DIR_NLOHMANN_JSON=${DEPS_DIR}/nlohmann_json"
          echo "TASH_FC_ARGS=${FC_ARGS}" >> "$GITHUB_ENV"
      - name: Build with coverage
        run: |
          JOBS=$(getconf _NPROCESSORS_ONLN)
          cmake -B build -DBUILD_TESTS=ON -DTASH_COVERAGE=ON ${TASH_FC_ARGS:-} \
            -DCMAKE_BUILD_TYPE=Debug
          cmake --build build -j "$JOBS"
      - name: Run tests
        run: ctest --test-dir build --output-on-failure -j "$(getconf _NPROCESSORS_ONLN)"
      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch
          lcov --remove coverage.info '/usr/*' '*/build/_deps/*' '*/tests/*' --output-file coverage.info --ignore-errors unused
          lcov --list coverage.info
      - name: Enforce coverage threshold
        # Fail the job when line coverage drops below the floor. Start
        # intentionally loose — the bar is "don't gut the tests", not
        # "achieve 95%". Large parts of the repo (plugins, AI stack,
        # live providers) are integration-testable only and weigh the
        # denominator down; the number below reflects reality today
        # and exists to catch *regressions*. Ratchet up over time.
        env:
          COVERAGE_FLOOR: 10
        run: |
          # `lcov --list` uses `|` as an unspaced column separator:
          #   Total:|11.7% 4063| 0.0% 397|   -   0
          # Split on `|`, take the second field, strip everything
          # from the first whitespace-or-% onward to leave just "11.7".
          PCT=$(lcov --list coverage.info 2>/dev/null \
                | awk -F'|' '/Total:/ {
                    sub(/[[:space:]%].*/, "", $2);
                    print $2; exit
                  }')
          if [ -z "$PCT" ]; then
            echo "WARNING: could not parse coverage summary — skipping threshold check"
            lcov --list coverage.info | tail -20
            exit 0
          fi
          echo "Line coverage: ${PCT}% (floor: ${COVERAGE_FLOOR}%)"
          awk -v p="$PCT" -v f="$COVERAGE_FLOOR" \
            'BEGIN { if (p+0 < f+0) { print "coverage dropped below floor"; exit 1 } }'
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.info

  fuzz:
    # Parser fuzzing with libFuzzer + ASan + UBSan. Each PR run fuzzes
    # for 60 seconds — long enough to catch crashes that a bug-planting
    # commit introduces, short enough not to dominate CI time. A
    # scheduled longer run is a candidate for the nightly workflow.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsqlite3-dev nlohmann-json3-dev clang
      - name: Pre-fetch FetchContent tarballs
        # GitHub's codeload CDN returns intermittent 504s; CMake's
        # file(DOWNLOAD) doesn't retry, so a single blip burns the whole
        # job (see B6.3 incident — 4+ PR runs lost in a day). curl
        # retries cleanly; we extract to a known dir and point CMake at
        # it via FETCHCONTENT_SOURCE_DIR_<NAME>, which makes FetchContent
        # skip the download entirely. (FETCHCONTENT_SOURCE_DIR_* is a
        # CMake cache variable, not an env var — so we export the -D
        # flags as $TASH_FC_ARGS and splice that into every cmake -B.)
        run: |
          set -e
          DEPS_DIR="${RUNNER_TEMP:-/tmp}/tash-deps"
          mkdir -p "${DEPS_DIR}"
          fetch() {
            local name="$1" url="$2"
            local tgz="${DEPS_DIR}/${name}.tar"
            echo "Pre-fetching ${name} from ${url}"
            curl --retry 5 --retry-delay 10 --retry-all-errors \
                 --fail --silent --show-error --max-time 120 \
                 -L -o "${tgz}" "${url}"
            mkdir -p "${DEPS_DIR}/${name}"
            tar -xf "${tgz}" --strip-components=1 -C "${DEPS_DIR}/${name}"
            rm -f "${tgz}"
          }
          fetch replxx https://github.com/AmokHuginnsson/replxx/archive/refs/tags/release-0.0.4.tar.gz
          fetch googletest https://github.com/google/googletest/archive/refs/tags/v1.14.0.tar.gz
          fetch nlohmann_json https://github.com/nlohmann/json/releases/download/v3.11.3/json.tar.xz
          FC_ARGS="-DFETCHCONTENT_SOURCE_DIR_REPLXX=${DEPS_DIR}/replxx"
          FC_ARGS="${FC_ARGS} -DFETCHCONTENT_SOURCE_DIR_GOOGLETEST=${DEPS_DIR}/googletest"
          FC_ARGS="${FC_ARGS} -DFETCHCONTENT_SOURCE_DIR_NLOHMANN_JSON=${DEPS_DIR}/nlohmann_json"
          echo "TASH_FC_ARGS=${FC_ARGS}" >> "$GITHUB_ENV"
      - name: Build fuzzer
        run: |
          cmake -B build-fuzz -DTASH_ENABLE_FUZZER=ON ${TASH_FC_ARGS:-} \
            -DCMAKE_CXX_COMPILER=clang++ -DBUILD_TESTS=OFF
          cmake --build build-fuzz --target tash_parser_fuzzer -j "$(getconf _NPROCESSORS_ONLN)"
      - name: Run fuzzer (60s)
        run: |
          ./build-fuzz/tash_parser_fuzzer fuzz/corpus \
            -max_total_time=60 -print_final_stats=1
      - name: Upload any crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: |
            crash-*
            leak-*
            oom-*
