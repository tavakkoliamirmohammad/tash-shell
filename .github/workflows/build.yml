name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel in-progress runs when a newer commit lands on the same ref.
# Keeps us from wasting runner time on commits a user has already
# superseded — and prevents a slow macOS lane from blocking a merge
# by being "still running from 20 minutes ago".
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsqlite3-dev nlohmann-json3-dev
      - name: Build and test
        run: |
          JOBS=$(getconf _NPROCESSORS_ONLN)
          cmake -B build -DBUILD_TESTS=ON
          cmake --build build -j "$JOBS"
          ctest --test-dir build --output-on-failure -j "$JOBS"
      - name: Smoke test
        run: echo -e "pwd\nls\necho hello\nexit" | ./build/tash.out
      - name: Assert full feature set
        # Every lane with OpenSSL + libcurl + SQLite installed should
        # produce a binary that reports +ai and +sqlite-history. Catches
        # the class of bug where a well-meaning refactor silently drops
        # a feature because CMake couldn't find a header.
        run: |
          FEATURES=$(./build/tash.out --version)
          echo "$FEATURES"
          echo "$FEATURES" | grep -q '+ai' \
            || { echo "FAIL: AI not compiled in on full-deps lane"; exit 1; }
          echo "$FEATURES" | grep -q '+sqlite-history' \
            || { echo "FAIL: SQLite history not compiled in on full-deps lane"; exit 1; }
      - name: Test install script (from-source path)
        run: |
          INSTALL_DIR=${{ runner.temp }}/tash-install
          mkdir -p "$INSTALL_DIR"
          cmake -B install-build -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build install-build -j "$(getconf _NPROCESSORS_ONLN)"
          install -m 755 install-build/tash.out "$INSTALL_DIR/tash"
          echo -e "echo install_test\nexit" | "$INSTALL_DIR/tash"
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tash-${{ matrix.os }}
          path: build/tash.out

  build-fedora:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: dnf install -y gcc-c++ cmake make libcurl-devel sqlite-devel json-devel git
      - name: Build and test
        run: |
          JOBS=$(getconf _NPROCESSORS_ONLN)
          cmake -B build -DBUILD_TESTS=ON
          cmake --build build -j "$JOBS"
          ctest --test-dir build --output-on-failure -j "$JOBS"
      - name: Smoke test
        run: echo -e "pwd\nls\necho hello\nexit" | ./build/tash.out
      - name: Test install workflow
        run: |
          cmake -B install-build -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build install-build -j "$(getconf _NPROCESSORS_ONLN)"
          install -m 755 install-build/tash.out /usr/local/bin/tash
          echo -e "echo install_test\nexit" | /usr/local/bin/tash

  build-alpine:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: apk add --no-cache g++ cmake make linux-headers curl-dev sqlite-dev nlohmann-json git
      - name: Build and test
        run: |
          JOBS=$(getconf _NPROCESSORS_ONLN)
          cmake -B build -DBUILD_TESTS=ON
          cmake --build build -j "$JOBS"
          ctest --test-dir build --output-on-failure -j "$JOBS"
      - name: Smoke test
        run: echo -e "pwd\nls\necho hello\nexit" | ./build/tash.out
      - name: Test install workflow
        run: |
          cmake -B install-build -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build install-build -j "$(getconf _NPROCESSORS_ONLN)"
          install -m 755 install-build/tash.out /usr/local/bin/tash
          echo -e "echo install_test\nexit" | /usr/local/bin/tash

  # No-AI static build — mirrors the Alpine static lane in
  # publish-master.yml. Catches regressions where a non-AI source file
  # references something behind `#ifdef TASH_AI_ENABLED` (or any feature
  # behind `#ifdef TASH_SQLITE_ENABLED`) before merge, not after.
  build-alpine-static-no-ai:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps (no AI/SQLite — matches publish-master static lane)
        run: apk add --no-cache g++ cmake make linux-headers git
      - name: Build Release (static, no AI/SQLite)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF \
            -DCMAKE_EXE_LINKER_FLAGS="-static"
          cmake --build build -j "$(getconf _NPROCESSORS_ONLN)"
      - name: Smoke test static binary
        run: echo -e "echo static_no_ai_ok\nexit" | ./build/tash.out

  # Artifact-build dry run — exercises the exact same manylinux_2_28
  # toolchain and build recipe that publish-master.yml uses, on every
  # PR. Without this, the first time that environment sees a new
  # commit is after merge, which is how the cpp-httplib/OpenSSL 3
  # mismatch slipped through. Keeps the Linux amd64 artifact lane
  # self-healing: if it breaks in a PR, we see it pre-merge.
  build-manylinux:
    runs-on: ubuntu-22.04
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (dnf on AlmaLinux 8)
        run: dnf install -y cmake gcc-c++ make libcurl-devel sqlite-devel json-devel
      - name: Build Release
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF
          cmake --build build -j "$(getconf _NPROCESSORS_ONLN)"
      - name: Assert full feature set + smoke test
        run: |
          FEATURES=$(./build/tash.out --version)
          echo "$FEATURES"
          echo "$FEATURES" | grep -q '+ai' \
            || { echo "FAIL: AI not compiled in on manylinux lane"; exit 1; }
          echo "$FEATURES" | grep -q '+sqlite-history' \
            || { echo "FAIL: SQLite history not compiled in on manylinux lane"; exit 1; }
          echo -e "echo manylinux_ok\nexit" | ./build/tash.out

  sanitizer:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsqlite3-dev nlohmann-json3-dev
      - name: Build with AddressSanitizer
        run: |
          JOBS=$(getconf _NPROCESSORS_ONLN)
          cmake -B build -DBUILD_TESTS=ON \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"
          cmake --build build -j "$JOBS"
      - name: Run unit tests with sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: ./build/test_tokenizer
      - name: Run integration tests with sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: ctest --test-dir build --output-on-failure -j "$(getconf _NPROCESSORS_ONLN)"
      - name: Smoke test with sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: echo -e "pwd\nls\necho hello\nexit" | ./build/tash.out

  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsqlite3-dev nlohmann-json3-dev lcov
      - name: Build with coverage
        run: |
          JOBS=$(getconf _NPROCESSORS_ONLN)
          cmake -B build -DBUILD_TESTS=ON \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          cmake --build build -j "$JOBS"
      - name: Run tests
        run: ctest --test-dir build --output-on-failure -j "$(getconf _NPROCESSORS_ONLN)"
      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch
          lcov --remove coverage.info '/usr/*' '*/build/_deps/*' '*/tests/*' --output-file coverage.info --ignore-errors unused
          lcov --list coverage.info
      - name: Enforce coverage threshold
        # Fail the job when line coverage drops below the floor. Start
        # intentionally loose — the bar is "don't gut the tests", not
        # "achieve 95%". Large parts of the repo (plugins, AI stack,
        # live providers) are integration-testable only and weigh the
        # denominator down; the number below reflects reality today
        # and exists to catch *regressions*. Ratchet up over time.
        env:
          COVERAGE_FLOOR: 10
        run: |
          # `lcov --list` uses `|` as an unspaced column separator:
          #   Total:|11.7% 4063| 0.0% 397|   -   0
          # Split on `|`, take the second field, strip everything
          # from the first whitespace-or-% onward to leave just "11.7".
          PCT=$(lcov --list coverage.info 2>/dev/null \
                | awk -F'|' '/Total:/ {
                    sub(/[[:space:]%].*/, "", $2);
                    print $2; exit
                  }')
          if [ -z "$PCT" ]; then
            echo "WARNING: could not parse coverage summary — skipping threshold check"
            lcov --list coverage.info | tail -20
            exit 0
          fi
          echo "Line coverage: ${PCT}% (floor: ${COVERAGE_FLOOR}%)"
          awk -v p="$PCT" -v f="$COVERAGE_FLOOR" \
            'BEGIN { if (p+0 < f+0) { print "coverage dropped below floor"; exit 1 } }'
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.info

  fuzz:
    # Parser fuzzing with libFuzzer + ASan + UBSan. Each PR run fuzzes
    # for 60 seconds — long enough to catch crashes that a bug-planting
    # commit introduces, short enough not to dominate CI time. A
    # scheduled longer run is a candidate for the nightly workflow.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsqlite3-dev nlohmann-json3-dev clang
      - name: Build fuzzer
        run: |
          cmake -B build-fuzz -DTASH_ENABLE_FUZZER=ON \
            -DCMAKE_CXX_COMPILER=clang++ -DBUILD_TESTS=OFF
          cmake --build build-fuzz --target tash_parser_fuzzer -j "$(getconf _NPROCESSORS_ONLN)"
      - name: Run fuzzer (60s)
        run: |
          ./build-fuzz/tash_parser_fuzzer fuzz/corpus \
            -max_total_time=60 -print_final_stats=1
      - name: Upload any crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: |
            crash-*
            leak-*
            oom-*
