name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev
      - name: Build
        run: g++ main.cpp colors.cpp -lreadline -o shell.out -std=c++11
      - name: Smoke test
        run: echo -e "pwd\nls\nexit" | ./shell.out

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: g++ main.cpp colors.cpp -lreadline -o shell.out -std=c++11
      - name: Smoke test
        run: echo -e "pwd\nls\nexit" | ./shell.out
