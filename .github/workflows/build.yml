name: Build & Test

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libcurl4-openssl-dev
      - name: Build and test
        run: |
          cmake -B build -DBUILD_TESTS=ON
          cmake --build build
          ctest --test-dir build --output-on-failure
      - name: Smoke test
        run: echo -e "pwd\nls\necho hello\nexit" | ./build/tash.out
      - name: Test install script (from-source path)
        run: |
          INSTALL_DIR=${{ runner.temp }}/tash-install
          mkdir -p "$INSTALL_DIR"
          cmake -B install-build -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build install-build
          install -m 755 install-build/tash.out "$INSTALL_DIR/tash"
          echo -e "echo install_test\nexit" | "$INSTALL_DIR/tash"
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tash-${{ matrix.os }}
          path: build/tash.out

  build-fedora:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: dnf install -y gcc-c++ cmake make openssl-devel libcurl-devel
      - name: Build and test
        run: |
          cmake -B build -DBUILD_TESTS=ON
          cmake --build build
          ctest --test-dir build --output-on-failure
      - name: Smoke test
        run: echo -e "pwd\nls\necho hello\nexit" | ./build/tash.out
      - name: Test install workflow
        run: |
          cmake -B install-build -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build install-build
          install -m 755 install-build/tash.out /usr/local/bin/tash
          echo -e "echo install_test\nexit" | /usr/local/bin/tash

  build-alpine:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: apk add --no-cache g++ cmake make linux-headers openssl-dev curl-dev
      - name: Build and test
        run: |
          cmake -B build -DBUILD_TESTS=ON
          cmake --build build
          ctest --test-dir build --output-on-failure
      - name: Smoke test
        run: echo -e "pwd\nls\necho hello\nexit" | ./build/tash.out
      - name: Test install workflow
        run: |
          cmake -B install-build -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build install-build
          install -m 755 install-build/tash.out /usr/local/bin/tash
          echo -e "echo install_test\nexit" | /usr/local/bin/tash

  sanitizer:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libcurl4-openssl-dev
      - name: Build with AddressSanitizer
        run: |
          cmake -B build -DBUILD_TESTS=ON \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"
          cmake --build build
      - name: Run unit tests with sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: ./build/test_tokenizer
      - name: Run integration tests with sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: ctest --test-dir build --output-on-failure
      - name: Smoke test with sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: echo -e "pwd\nls\necho hello\nexit" | ./build/tash.out

  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libcurl4-openssl-dev lcov
      - name: Build with coverage
        run: |
          cmake -B build -DBUILD_TESTS=ON \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          cmake --build build
      - name: Run tests
        run: ctest --test-dir build --output-on-failure
      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch
          lcov --remove coverage.info '/usr/*' '*/build/_deps/*' '*/tests/*' --output-file coverage.info --ignore-errors unused
          lcov --list coverage.info
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.info
