  build-alpine:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: apk add --no-cache g++ cmake make linux-headers curl curl-dev sqlite-dev nlohmann-json git tar
