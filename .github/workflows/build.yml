name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev
      - name: Build and test
        run: |
          cmake -B build -DBUILD_TESTS=ON
          cmake --build build
          ctest --test-dir build --output-on-failure
      - name: Smoke test
        run: echo -e "pwd\nls\necho hello\nexit" | ./build/shell.out
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: amish-${{ matrix.os }}
          path: build/shell.out

  build-fedora:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: dnf install -y gcc-c++ readline-devel cmake make
      - name: Build and test
        run: |
          cmake -B build -DBUILD_TESTS=ON
          cmake --build build
          ctest --test-dir build --output-on-failure
      - name: Smoke test
        run: echo -e "pwd\nls\necho hello\nexit" | ./build/shell.out

  build-alpine:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: apk add --no-cache g++ readline-dev cmake make linux-headers
      - name: Build and test
        run: |
          cmake -B build -DBUILD_TESTS=ON
          cmake --build build
          ctest --test-dir build --output-on-failure
      - name: Smoke test
        run: echo -e "pwd\nls\necho hello\nexit" | ./build/shell.out
