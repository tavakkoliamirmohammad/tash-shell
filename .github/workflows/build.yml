  # Artifact-build dry run — exercises the exact same manylinux_2_28
  # toolchain and build recipe that publish-master.yml uses, on every
  # PR. Without this, the first time that environment sees a new
  # commit is after merge, which is how the cpp-httplib/OpenSSL 3
  # mismatch slipped through. Keeps the Linux amd64 artifact lane
  # self-healing: if it breaks in a PR, we see it pre-merge.
  build-manylinux:
    runs-on: ubuntu-22.04
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (dnf on AlmaLinux 8)
        run: dnf install -y cmake gcc-c++ make libcurl-devel sqlite-devel json-devel
      - name: Pre-fetch FetchContent tarballs
        # GitHub's codeload CDN returns intermittent 504s; CMake's
        # file(DOWNLOAD) doesn't retry, so a single blip burns the whole
        # job (see B6.3 incident — 4+ PR runs lost in a day). curl
        # retries cleanly; we extract to a known dir and point CMake at
        # it via FETCHCONTENT_SOURCE_DIR_<NAME>, which makes FetchContent
        # skip the download entirely. (FETCHCONTENT_SOURCE_DIR_* is a
        # CMake cache variable, not an env var — so we export the -D
        # flags as $TASH_FC_ARGS and splice that into every cmake -B.)
        run: |
          set -e
