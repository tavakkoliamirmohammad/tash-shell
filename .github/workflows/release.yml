name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux amd64 — glibc dynamic, full-featured (AI + SQLite).
          # Built in manylinux_2_28 for a glibc 2.28 baseline — covers
          # Ubuntu 20.04+, Debian 11+, RHEL/Rocky/Alma 8+, Fedora 30+,
          # Amazon Linux 2023, Arch.
          - os: ubuntu-22.04
            container: quay.io/pypa/manylinux_2_28_x86_64
            artifact: tash-linux-amd64
            kind: linux-manylinux
          # Linux arm64 — same glibc baseline on aarch64.
          - os: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            artifact: tash-linux-arm64
            kind: linux-manylinux
          # macOS arm64 — Apple Silicon.
          - os: macos-14
            artifact: tash-macos-arm64
            kind: macos
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (manylinux — dnf on AlmaLinux 8)
        if: matrix.kind == 'linux-manylinux'
        run: |
          dnf install -y cmake gcc-c++ make \
            libcurl-devel sqlite-devel json-devel
      - name: Pre-fetch FetchContent tarballs
        # GitHub's codeload CDN returns intermittent 504s; CMake's
        # file(DOWNLOAD) doesn't retry, so a single blip burns the whole
        # job (see B6.3 incident — 4+ PR runs lost in a day). curl
        # retries cleanly; we extract to a known dir and point CMake at
        # it via FETCHCONTENT_SOURCE_DIR_<NAME>, which makes FetchContent
        # skip the download entirely. (FETCHCONTENT_SOURCE_DIR_* is a
        # CMake cache variable, not an env var — so we export the -D
        # flags as $TASH_FC_ARGS and splice that into every cmake -B.)
        run: |
          set -e
          DEPS_DIR="${RUNNER_TEMP:-/tmp}/tash-deps"
          mkdir -p "${DEPS_DIR}"
          fetch() {
            local name="$1" url="$2"
            local tgz="${DEPS_DIR}/${name}.tar"
            echo "Pre-fetching ${name} from ${url}"
            curl --retry 5 --retry-delay 10 --retry-all-errors \
                 --fail --silent --show-error --max-time 120 \
                 -L -o "${tgz}" "${url}"
            mkdir -p "${DEPS_DIR}/${name}"
            tar -xf "${tgz}" --strip-components=1 -C "${DEPS_DIR}/${name}"
            rm -f "${tgz}"
          }
          fetch replxx https://github.com/AmokHuginnsson/replxx/archive/refs/tags/release-0.0.4.tar.gz
          fetch googletest https://github.com/google/googletest/archive/refs/tags/v1.14.0.tar.gz
          fetch nlohmann_json https://github.com/nlohmann/json/releases/download/v3.11.3/json.tar.xz
          FC_ARGS="-DFETCHCONTENT_SOURCE_DIR_REPLXX=${DEPS_DIR}/replxx"
          FC_ARGS="${FC_ARGS} -DFETCHCONTENT_SOURCE_DIR_GOOGLETEST=${DEPS_DIR}/googletest"
          FC_ARGS="${FC_ARGS} -DFETCHCONTENT_SOURCE_DIR_NLOHMANN_JSON=${DEPS_DIR}/nlohmann_json"
          echo "TASH_FC_ARGS=${FC_ARGS}" >> "$GITHUB_ENV"
      - name: Build
        env:
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF ${TASH_FC_ARGS:-}
          cmake --build build -j "$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 2)"
          strip build/tash.out
          cp build/tash.out "$ARTIFACT"
      - name: Verify binary
        run: ./${{ matrix.artifact }} -c "echo tash_release_test" 2>/dev/null || echo "Binary built successfully"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  create-release:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
